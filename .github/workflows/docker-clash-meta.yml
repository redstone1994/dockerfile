name: clash-meta

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even if tag exists"
        required: false
        default: "false"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/clash-meta

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest tag
        id: tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r  .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $TAG"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: false

      # 🏗️ 多架构支持
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # 🔥 构建并推送
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: clash-meta/.
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            TAG=${{ steps.tag.outputs.tag }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}